name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP tests + lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, mbstring, fileinfo, gd
          coverage: none
          tools: none

      - name: PHP syntax lint
        run: |
          set -e
          find core controllers models admin public bin tests -name "*.php" -print0 \
            | xargs -0 -n1 -P4 php -l > /tmp/lint.log 2>&1 || (cat /tmp/lint.log && exit 1)
          grep -v "No syntax errors" /tmp/lint.log && exit 1 || true
          echo "Lint OK"

      - name: Run test suite
        run: php tests/run.php
